{{ define "main" }}
<div class="container">
  <h1>{{ .Title }}</h1>
  <div class="posts-list">
    {{ range .Pages }}
    <article class="post-item">
      <h2><a href="{{ .RelPermalink }}">{{ .Title }}</a></h2>
      <div class="post-meta">
        <time>{{ .Date.Format "2006-01-02" }}</time>
        {{ with .Params.tags }}
        <span class="tags">
          {{ range . }}
          <a href="/tags/{{ . | urlize }}" class="tag">#{{ . }}</a>
          {{ end }}
        </span>
        {{ end }}
      </div>
      <p>{{ .Summary }}</p>
    </article>
    {{ end }}
  </div>
</div>
{{ end }}
